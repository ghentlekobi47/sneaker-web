<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneakers Product Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Kumbh Sans', sans-serif;
        }
        .thumbnail-active {
            border: 2px solid black;
            opacity: 0.5;
        }
    </style>
</head>
<body class="bg-white">
    <!-- Navigation -->
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 border-b border-gray-200">
        <div class="flex justify-between h-24 items-center">
            <div class="flex items-center gap-12">
                <div class="flex-shrink-0 flex items-center gap-4">
                    <button class="lg:hidden">
        
                    </button>
                    <img src="assets/sneaker image.jpeg" alt="Sneakers Logo" class="h-5">
                </div>
                <div class="hidden lg:flex space-x-8">
                    <a href="#" class="text-gray-500 hover:text-black border-b-4 border-transparent hover:border-orange-500 h-24 flex items-center transition-all">Collections</a>
                    <a href="#" class="text-gray-500 hover:text-black border-b-4 border-transparent hover:border-orange-500 h-24 flex items-center transition-all">Men</a>
                    <a href="#" class="text-gray-500 hover:text-black border-b-4 border-transparent hover:border-orange-500 h-24 flex items-center transition-all">Women</a>
                    <a href="#" class="text-gray-500 hover:text-black border-b-4 border-transparent hover:border-orange-500 h-24 flex items-center transition-all">About</a>
                    <a href="#" class="text-gray-500 hover:text-black border-b-4 border-transparent hover:border-orange-500 h-24 flex items-center transition-all">Contact</a>
                </div>
            </div>
            <div class="flex items-center gap-8">
                <button class="relative">
                    <span class="absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-bold px-2 rounded-full">3</span>
                </button>
                <img src="assets/image.jpeg" alt="image" class="h-12 w-12 rounded-full border-2 border-transparent hover:border-orange-500 cursor-pointer transition-all">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12 lg:py-24">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24 items-center">
            
            <!-- Image Gallery -->
            <div class="space-y-8">
                <div class="relative rounded-2xl overflow-hidden cursor-pointer">
                    <img id="main-image" src="assets/sneaker image.jpeg" alt="Fall Limited Edition Sneakers" class="w-full">
                </div>
                <div class="grid grid-cols-4 gap-8">
                    <div class="rounded-xl overflow-hidden cursor-pointer border-2 border-orange-500 ring-2 ring-orange-500 ring-opacity-50">
                        <img src="assets/sneaker image.jpeg" alt="Thumbnail 1" class="opacity-40 hover:opacity-60 transition-all">
                    </div>
                    <div class="rounded-xl overflow-hidden cursor-pointer hover:ring-2 hover:ring-orange-500 hover:ring-opacity-50 transition-all">
                        <img src="assets/sneaker image.jpeg" alt="Thumbnail 2" class="hover:opacity-60 transition-all">
                    </div>
                    <div class="rounded-xl overflow-hidden cursor-pointer hover:ring-2 hover:ring-orange-500 hover:ring-opacity-50 transition-all">
                        <img src="assets/sneaker image.jpeg" alt="Thumbnail 3" class="hover:opacity-60 transition-all">
                    </div>
                    <div class="rounded-xl overflow-hidden cursor-pointer hover:ring-2 hover:ring-orange-500 hover:ring-opacity-50 transition-all">
                        <img src="assets/sneaker image.jpeg" alt="Thumbnail 4" class="hover:opacity-60 transition-all">
                    </div>
                </div>
            </div>

            <!-- Product Info -->
            <div class="space-y-6">
                <h3 class="text-orange-500 font-bold uppercase tracking-widest text-sm">Sneaker shop</h3>
                <h1 class="text-4xl lg:text-5xl font-bold text-red-900 leading-tight">ExclusiveSneaker Collection</h1>
                <p class="text-black-500 leading-relaxed">
                    These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they'll withstand everything the weather can offer.
                </p>
                
                <div class="space-y-2">
                    <div class="flex items-center gap-4">
                        <span class="text-3xl font-bold text-red-900">$250.00</span>
                        <span class="bg-orange-100 text-orange-500 font-bold px-2 py-0.5 rounded text-sm">50%</span>
                    </div>
                    <span class="text-yellow-400 line-through font-bold">$500.00</span>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 pt-4">
                    <div class="flex items-center justify-between bg-gray-100 rounded-lg px-4 py-4 sm:w-1/3">
                        <button class="text-orange-500 hover:opacity-70 transition-all">

                        </button>
                        <span class="font-bold text-gray-900">15</span>
                        <button class="text-orange-500 hover:opacity-70 transition-all">
                    
                        </button>
                    </div>
                    <button class="flex-1 bg-orange-500 hover:bg-orange-400 text-white font-bold py-4 rounded-lg shadow-lg shadow-orange-200 flex items-center justify-center gap-4 transition-all">
                
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
